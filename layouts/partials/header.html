<header class="site-header" id="site-header">
  <nav class="nav-inner" aria-label="Hauptnavigation">

    <a href="/" class="nav-logo" aria-label="meerwert – kuonen Startseite">
      <svg class="nav-logo-svg" viewBox="0 0 380 80" width="190" height="40"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <text x="4" y="66"
              font-family="'Space Grotesk', 'Arial Black', system-ui, sans-serif"
              font-weight="700"
              font-size="64">
          <tspan fill="#4A5568">meer</tspan><tspan fill="#C8102E">wert</tspan>
        </text>
      </svg>
    </a>

    <ul class="nav-links" role="list">
      <li><a href="/" {{ if .IsHome }}class="active" aria-current="page"{{ end }}>Start</a></li>
      <li><a href="/angebot/" {{ if eq .Section "angebot" }}class="active" aria-current="page"{{ end }}>Angebot</a></li>
      <li><a href="/ueber-mich/" {{ if eq .RelPermalink "/ueber-mich/" }}class="active" aria-current="page"{{ end }}>Über mich</a></li>
      <li><a href="/perspektiven/" {{ if eq .Section "perspektiven" }}class="active" aria-current="page"{{ end }}>Perspektiven</a></li>
    </ul>

    <div class="nav-cta">
      <a href="/kontakt/" class="btn btn--primary">{{ .Site.Params.ctaText }}</a>
    </div>

    <button class="nav-toggle"
            id="nav-toggle"
            aria-label="Menü öffnen"
            aria-expanded="false"
            aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </nav>
</header>
