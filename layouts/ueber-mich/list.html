{{ define "main" }}
<div class="container">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
  </div>

  <div class="ueber-mich-layout">

    <!-- Portrait -->
    <div class="ueber-mich-portrait">
      {{ if fileExists "static/img/portrait.jpg" }}
      <img src="/img/portrait.jpg" alt="Bernhard Kuonen" width="320" height="400">
      {{ end }}
    </div>

    <!-- Text -->
    <div class="ueber-mich-content">
      {{ .Content }}
      <div style="margin-top: var(--space-lg);">
        <a href="/kontakt/" class="btn btn--primary">{{ .Site.Params.ctaText }}</a>
      </div>
    </div>

  </div>
</div>
{{ end }}
