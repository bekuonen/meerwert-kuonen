{{ define "main" }}
<div class="container">

  <div class="page-header">
    <h1>Ein Gespräch beginnt mit einer Klärung</h1>
    <p>{{ .Params.intro }}</p>
  </div>

  <div class="kontakt-form">
    <form
      name="kontakt"
      method="POST"
      action="{{ .Params.danke_url }}"
      data-web3forms-key="DEIN-WEB3FORMS-KEY"
    >
      <!-- Honeypot Spam-Schutz -->
      <div class="form-honey" aria-hidden="true">
        <input type="text" name="_honey" tabindex="-1" autocomplete="off">
      </div>
      <input type="hidden" name="_subject" value="Neue Anfrage über meerwert.ch">
      <input type="hidden" name="_redirect" value="{{ .Site.BaseURL }}danke/">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="name" placeholder="">
      </div>

      <div class="form-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="">
      </div>

      <div class="form-group">
        <label for="nachricht">Nachricht</label>
        <textarea id="nachricht" name="nachricht" required rows="5"></textarea>
      </div>

      <button type="submit" class="btn btn--primary">Nachricht senden</button>
    </form>
  </div>

</div>
{{ end }}
