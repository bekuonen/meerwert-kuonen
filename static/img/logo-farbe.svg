<?xml version="1.0" encoding="UTF-8"?>
<!-- meerwert · Wortmarke · Farbig · skalierbar -->
<!-- meer: #1A1A1A Schwarz / wert: #C8102E Walliserrot -->
<!-- Mindestgrösse: 120px Breite -->
<svg viewBox="0 0 380 80" width="380" height="80"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&amp;display=swap');
      .logo { font-family: Syne, 'Arial Black', sans-serif; font-weight: 700; font-size: 64px; }
    </style>
  </defs>
  <text x="4" y="66" class="logo">
    <tspan fill="#4A5568">meer</tspan><tspan fill="#C8102E">wert</tspan>
  </text>
</svg>
